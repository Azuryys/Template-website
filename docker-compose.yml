
services:
  backend:
    build: ./backend
    container_name: template-backend
    environment:
      PORT: 3001
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: BannerCreator
      DB_USER: postgres
      DB_PASSWORD: Brasilgo@1
      FRONTEND_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-chave-secreta-padrao}
      BETTER_AUTH_URL: http://localhost:3001
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      NODE_ENV: development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run migrate && npm run dev"

  frontend:
    build: ./frontend
    container_name: template-frontend
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"

